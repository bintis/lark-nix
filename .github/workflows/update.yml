name: update

on:
  schedule:
    # Daily at 06:00 UTC (14:00 Beijing, 02:00 New York).
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Run update.sh
        run: bash update.sh

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet lark.nix; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(grep -oE 'version = "[^"]+"' lark.nix | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lark.nix
          git commit -m "lark: bump to $version"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # If we pushed, the build workflow will fire on the new commit and
      # take care of building + pushing to Cachix. Nothing more to do here.
